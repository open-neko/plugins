name: publish

# Publish every @open-neko/* plugin whose version on npm doesn't already
# match the version in package.json. Triggered by:
#   - any tag push matching v*  (e.g. release-please cuts v1.0.0)
#   - manual dispatch for re-runs after fixing a publish failure
#
# Uses npm Trusted Publishers (OIDC) — no NPM_TOKEN secret needed. Each
# package must be configured as a Trusted Publisher on npmjs.com first
# (one-time per package or once at the @open-neko scope). See README/
# CONTRIBUTING for the setup link.
#
# `pnpm -r publish` walks packages in topological order so plugin-types
# publishes before parallel-search/slack/scalekit (which depend on it
# via workspace:*), converts the workspace:* range to the matching
# version on the fly, and skips packages whose version is already on
# the registry — so re-runs are safe.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  # id-token: write enables OIDC token exchange with npmjs.com. Combined
  # with a Trusted Publisher configured on npm for each package, this
  # lets the workflow publish without a long-lived token in repo secrets.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      - name: Inventory packages before publish
        run: |
          set -euo pipefail
          for pkg in packages/*/; do
            name=$(node -p "require('./$pkg/package.json').name")
            version=$(node -p "require('./$pkg/package.json').version")
            private=$(node -p "require('./$pkg/package.json').private || false")
            published=$(npm view "$name@$version" version 2>/dev/null || echo "not-on-registry")
            echo "[publish] $name@$version (private=$private, npm=$published)"
          done

      # pnpm publish --provenance triggers npm CLI's OIDC flow. With a
      # Trusted Publisher configured on npmjs.com, no token is needed.
      # --no-git-checks because we're on a fresh CI checkout, not a
      # contributor's working tree.
      - name: pnpm publish (OIDC via Trusted Publishers)
        run: pnpm -r publish --no-git-checks --access public --provenance
        env:
          NPM_CONFIG_PROVENANCE: "true"
