name: publish

# Publish every @open-neko/* plugin whose version on npm doesn't already
# match the version in package.json. Triggered by:
#   - a GitHub Release being published (release-please cuts one per package
#     on merge of its release PR — the App token it uses lets that release
#     event trigger this workflow; GITHUB_TOKEN-created releases would not)
#   - manual dispatch for re-runs after fixing a publish failure
#
# Auth is npm Trusted Publishing (OIDC) — no NPM_TOKEN secret. Each package
# is configured as a Trusted Publisher on npmjs.com pointing at this repo +
# workflow file; the id-token below lets `npm publish` exchange the GitHub
# OIDC token for a short-lived npm credential at publish time. Provenance is
# attached automatically.
#
# Why npm (not pnpm) does the publish: `pnpm publish` does NOT perform npm's
# OIDC trusted-publishing token exchange — only the npm CLI (>= 11.5.1) does.
# But npm doesn't understand pnpm's `workspace:*` dependency protocol, so we
# use `pnpm pack` to produce a tarball with workspace ranges rewritten to the
# concrete versions, then hand that tarball to `npm publish`.
on:
  release:
    types: [published]
  workflow_dispatch:

# Serialize publishes: a single release-please merge can create several
# GitHub Releases at once (one per bumped package), each firing this
# workflow. Running them one at a time avoids two jobs racing to first-
# publish the same package.
concurrency:
  group: publish-npm
  cancel-in-progress: false

permissions:
  # contents: write — commit the marketplace.json catalog sync back to main
  # after a successful publish (main is unprotected).
  contents: write
  # id-token: write enables the OIDC token exchange with npmjs.com that
  # Trusted Publishing relies on (no long-lived token in repo secrets).
  id-token: write
  # actions: write — dispatch the Pages rebuild; a GITHUB_TOKEN push to main
  # does not itself re-trigger the pages workflow.
  actions: write

jobs:
  publish:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # pnpm builds the workspace and packs each tarball (converting
      # workspace:* ranges). Version pinned via packageManager in package.json.
      - uses: pnpm/action-setup@v4

      # No registry-url: that would write `_authToken=` into .npmrc, which
      # takes precedence over OIDC and breaks Trusted Publishing. The default
      # registry (registry.npmjs.org) is what OIDC authenticates against.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      # Node 22 ships npm 10.x, which predates OIDC trusted publishing.
      # npm >= 11.5.1 performs the token exchange; pin to a known-good line.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@^11.5.1

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      # For each public package whose version isn't already on the registry:
      # pack with pnpm (rewrites workspace:* -> concrete versions), then
      # publish the tarball with the npm CLI so OIDC trusted publishing kicks
      # in. Skipping already-published versions makes re-runs and the N
      # releases from one merge idempotent.
      - name: Publish changed packages (npm OIDC trusted publishing)
        run: |
          set -euo pipefail
          for pkg in packages/*/; do
            private=$(node -p "require('./$pkg/package.json').private || false")
            [ "$private" = "true" ] && continue
            name=$(node -p "require('./$pkg/package.json').name")
            version=$(node -p "require('./$pkg/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "[skip] $name@$version already on npm"
              continue
            fi
            echo "[publish] $name@$version"
            tarball="$(cd "$pkg" && pnpm pack --pack-destination "$RUNNER_TEMP" | tail -n1)"
            npm publish "$tarball" --provenance --access public
          done

      # Mirror the now-live versions into marketplace.json (integrity from npm),
      # commit it back to main, and dispatch the Pages rebuild — so the catalog
      # and site track every release with zero manual edits. Idempotent.
      - name: Sync marketplace catalog + rebuild site
        env:
          GH_TOKEN: ${{ github.token }}
          # Just-published versions can lag the npm registry by tens of seconds;
          # wait for propagation so the sync never silently drops them (the
          # catalog-drift bug that then trips validate-live on the next PR).
          SYNC_WAIT_NPM_SECONDS: "120"
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          node scripts/sync-marketplace.mjs
          if git diff --quiet -- marketplace.json; then
            echo "[sync] catalog already current"
            exit 0
          fi
          git add marketplace.json
          git commit -m "chore(marketplace): sync published plugin versions"
          git push origin HEAD:main
          gh workflow run pages.yml --ref main
