name: release-please

# Opens (and auto-merges) a release PR for any plugin whose conventional
# commits since its last release warrant a bump. On merge, release-please
# tags + creates a GitHub Release per package; `publish.yml` fires on
# `release: published` and pushes the bumped package(s) to npm.
#
# Independent versions, one PR: each plugin (packages/*) is still versioned
# independently in manifest mode — a commit touching packages/slack/** bumps
# only @open-neko/plugin-slack. But all pending bumps share ONE release PR
# (separate-pull-requests: false). Separate per-package PRs each edit the
# shared .release-please-manifest.json, so two open at once conflict on
# adjacent lines and can't auto-merge in parallel — aggregating avoids that
# while keeping per-package tags/releases/publishes.
on:
  push:
    branches: [main]

# No write scopes here — the GitHub App token below carries the only write
# permissions this workflow needs (contents + PRs), mirroring the OpenNeko
# repo's release-please setup. The App token (unlike GITHUB_TOKEN) lets the
# GitHub Release it creates trigger publish.yml's `release: published`.
permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Short-lived installation token from a GitHub App scoped to
      # contents:write + pull-requests:write. Requires the same App that
      # OpenNeko uses to be installed on this repo, with RELEASE_PLEASE_APP_ID
      # + RELEASE_PLEASE_APP_PRIVATE_KEY available as secrets.
      - id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Enable auto-merge on the release PR(s) so cutting a release doesn't
      # need a human click. Resilient: a just-created PR can report an unknown
      # mergeable state for a few seconds, so retry; never let one PR's
      # transient failure abort the others (or the workflow).
      - name: Enable auto-merge on release PR(s)
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # Pass the release-please JSON through env, NOT inline ${{ }} into the
          # script: its CHANGELOG bodies carry ( ) and apostrophes that closed the
          # single-quoted string and broke the shell (syntax error near `(`).
          PRS_JSON: ${{ steps.release.outputs.prs }}
        run: |
          rc=0
          for pr in $(echo "$PRS_JSON" | jq -r '.[].number'); do
            ok=0
            for attempt in 1 2 3 4 5 6; do
              if gh pr merge --auto --squash "$pr" --repo "$GITHUB_REPOSITORY"; then
                echo "auto-merge enabled for #$pr"; ok=1; break
              fi
              echo "#$pr not ready (attempt $attempt); retrying in 10s"; sleep 10
            done
            [ "$ok" = 1 ] || { echo "::warning::could not enable auto-merge for #$pr"; rc=1; }
          done
          exit $rc
